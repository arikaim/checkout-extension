{% if status == 0 %}
    <div class="badge badge-sm badge-outline badge-info">{{ labels.pending }}</div> 
{% elseif status == 1 %}
    <div class="badge badge-sm badge-outline badge-success">{{ labels.completed }}</div> 
{% elseif status == 2 %}
    <div class="badge badge-sm badge-outline badge-warning">{{ labels.canceled }}</div> 
{% elseif status == 3 %}
    <div class="badge badge-sm badge-outline badge-error">{{ labels.error }}</div> 
{% elseif status == 4 %}
    <div class="badge badge-sm badge-outline badge-info">{{ labels.pending }}</div> 
{% endif %}
